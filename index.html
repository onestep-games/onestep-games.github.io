<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>OneStep Games</title>
<style>
  :root { color-scheme: light dark; }
  * { box-sizing: border-box; }
  body {
    margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
    font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Malgun Gothic", sans-serif;
    background: #f5f3ec; color: #2b2620;
  }
  @media (prefers-color-scheme: dark) { body { background: #1b1915; color: #e9e4d8; } }
  main { text-align: center; padding: 2rem; max-width: 34rem; }
  h1 { font-size: 2.4rem; margin: 0 0 .3rem; letter-spacing: .01em; }
  .tag { opacity: .7; margin: 0 0 2rem; font-size: 1rem; }
  ul { list-style: none; padding: 0; margin: 0 0 2rem; }
  li { padding: .7rem 0; font-size: 1.15rem; border-top: 1px solid rgba(128,128,128,.25); }
  li:last-child { border-bottom: 1px solid rgba(128,128,128,.25); }
  footer { font-size: .85rem; opacity: .55; }
  a { color: inherit; }
</style>
</head>
<body>
<main>
  <h1>OneStep Games</h1>
  <p class="tag">Small worlds, one step at a time.</p>
  <ul>
    <li>TinyDefense</li>
  </ul>
  <footer>Contact: chunsanet@gmail.com</footer>
</main>
</body>
</html>
